<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metin2-Like RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Georgia', serif; }
    #canvas { display: block; width: 100vw; height: 100vh; }

    /* ── HUD ── */
    #hud {
      position: fixed; inset: 0; pointer-events: none;
      z-index: 10;
    }

    /* Karakter paneli - sol alt */
    #char-panel {
      position: absolute; bottom: 20px; left: 20px;
      background: rgba(0,0,0,0.75);
      border: 1px solid #8B6914;
      border-radius: 6px;
      padding: 10px 14px;
      min-width: 220px;
      pointer-events: all;
    }
    #char-name {
      color: #FFD700; font-size: 14px; font-weight: bold;
      margin-bottom: 6px; text-align: center;
      text-shadow: 0 0 6px #FFD70088;
    }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .bar-label { color: #ccc; font-size: 11px; width: 24px; }
    .bar-track {
      flex: 1; height: 12px; background: #1a0000;
      border: 1px solid #555; border-radius: 2px; overflow: hidden;
    }
    #hp-bar  { height: 100%; background: linear-gradient(90deg,#8B0000,#DD2222); transition: width .3s; }
    #mp-bar  { height: 100%; background: linear-gradient(90deg,#00008B,#2244DD); transition: width .3s; }
    #exp-bar { height: 100%; background: linear-gradient(90deg,#4B0082,#9932CC); transition: width .3s; }
    .bar-text { color: #aaa; font-size: 10px; min-width: 56px; text-align: right; }
    #char-stats {
      display: flex; justify-content: space-between;
      margin-top: 6px; padding-top: 6px;
      border-top: 1px solid #8B691444;
    }
    .stat { color: #ccc; font-size: 11px; text-align: center; }
    .stat span { display: block; color: #FFD700; font-size: 13px; font-weight: bold; }

    /* Skill bar - alt orta */
    #skillbar {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px;
      background: rgba(0,0,0,0.75);
      border: 1px solid #8B6914;
      border-radius: 6px;
      padding: 6px;
      pointer-events: all;
    }
    .skill-slot {
      width: 48px; height: 48px;
      background: rgba(20,10,0,0.9);
      border: 1px solid #8B6914;
      border-radius: 4px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      transition: border-color .2s;
    }
    .skill-slot:hover { border-color: #FFD700; }
    .skill-slot .skill-icon { font-size: 22px; }
    .skill-slot .skill-key {
      position: absolute; bottom: 2px; right: 4px;
      color: #888; font-size: 9px;
    }
    .skill-slot .skill-cd {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 13px;
      border-radius: 4px;
      display: none;
    }

    /* Minimap - sağ üst */
    #minimap-wrap {
      position: absolute; top: 16px; right: 16px;
      border: 1px solid #8B6914;
      border-radius: 4px; overflow: hidden;
      pointer-events: all;
    }
    #minimap { display: block; }
    #map-name {
      text-align: center; background: rgba(0,0,0,0.8);
      color: #FFD700; font-size: 11px; padding: 2px 0;
      border-top: 1px solid #8B691444;
    }

    /* Sohbet & log - sol üst */
    #chatbox {
      position: absolute; bottom: 120px; left: 20px;
      width: 340px;
    }
    #chat-log {
      background: rgba(0,0,0,0.55);
      border: 1px solid #8B691444;
      border-radius: 4px 4px 0 0;
      height: 110px; overflow-y: auto;
      padding: 6px 8px;
      font-size: 12px;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .chat-line { color: #ddd; line-height: 1.5; }
    .chat-line.combat { color: #FF6644; }
    .chat-line.loot   { color: #FFD700; }
    .chat-line.level  { color: #88FF44; }
    .chat-line.system { color: #88CCFF; }

    /* Hedef bilgisi - üst orta */
    #target-panel {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      border: 1px solid #8B6914;
      border-radius: 6px; padding: 8px 16px;
      min-width: 180px; text-align: center;
      display: none;
    }
    #target-name { color: #FF6644; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
    #target-hp-track {
      height: 10px; background: #1a0000;
      border: 1px solid #555; border-radius: 2px; overflow: hidden;
    }
    #target-hp-bar { height: 100%; background: linear-gradient(90deg,#8B0000,#DD4444); transition: width .3s; width: 100%; }

    /* Koordinat göstergesi */
    #coords {
      position: absolute; top: 16px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      color: #ffffff44; font-size: 10px;
      text-shadow: 1px 1px 2px #000;
    }

    /* Yükleme ekranı */
    #loading {
      position: fixed; inset: 0; background: #0a0500;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    #loading h1 { color: #FFD700; font-size: 36px; letter-spacing: 6px; margin-bottom: 8px; text-shadow: 0 0 20px #FFD70088; }
    #loading p  { color: #8B6914; font-size: 14px; margin-bottom: 30px; }
    #loading-bar-track { width: 300px; height: 4px; background: #2a1a00; border: 1px solid #8B6914; border-radius: 2px; overflow: hidden; }
    #loading-bar { height: 100%; background: #FFD700; width: 0%; transition: width .3s; }
    #loading-status { color: #aaa; font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>

<!-- Yükleme ekranı -->
<div id="loading">
  <h1>⚔ RPG WORLD ⚔</h1>
  <p>Metin2-Like Adventure</p>
  <div id="loading-bar-track"><div id="loading-bar"></div></div>
  <div id="loading-status">Dünya yükleniyor...</div>
</div>

<!-- 3D Canvas -->
<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="hud">

  <!-- Karakter paneli -->
  <div id="char-panel">
    <div id="char-name">Savaşçı - Lv.<span id="char-level">1</span></div>
    <div class="bar-row">
      <div class="bar-label">HP</div>
      <div class="bar-track"><div id="hp-bar" style="width:100%"></div></div>
      <div class="bar-text"><span id="hp-val">500</span>/<span id="hp-max">500</span></div>
    </div>
    <div class="bar-row">
      <div class="bar-label">MP</div>
      <div class="bar-track"><div id="mp-bar" style="width:100%"></div></div>
      <div class="bar-text"><span id="mp-val">300</span>/<span id="mp-max">300</span></div>
    </div>
    <div class="bar-row">
      <div class="bar-label">EXP</div>
      <div class="bar-track"><div id="exp-bar" style="width:0%"></div></div>
      <div class="bar-text"><span id="exp-pct">0</span>%</div>
    </div>
    <div id="char-stats">
      <div class="stat">ATK<span id="stat-atk">45</span></div>
      <div class="stat">DEF<span id="stat-def">20</span></div>
      <div class="stat">SPD<span id="stat-spd">100</span></div>
      <div class="stat">ALTIN<span id="stat-gold">0</span></div>
    </div>
  </div>

  <!-- Skill bar -->
  <div id="skillbar">
    <div class="skill-slot" onclick="useSkill(0)">
      <div class="skill-icon">⚔</div>
      <div class="skill-key">Q</div>
      <div class="skill-cd" id="cd-0"></div>
    </div>
    <div class="skill-slot" onclick="useSkill(1)">
      <div class="skill-icon">🌪</div>
      <div class="skill-key">W</div>
      <div class="skill-cd" id="cd-1"></div>
    </div>
    <div class="skill-slot" onclick="useSkill(2)">
      <div class="skill-icon">🔥</div>
      <div class="skill-key">E</div>
      <div class="skill-cd" id="cd-2"></div>
    </div>
    <div class="skill-slot" onclick="useSkill(3)">
      <div class="skill-icon">💫</div>
      <div class="skill-key">R</div>
      <div class="skill-cd" id="cd-3"></div>
    </div>
    <div class="skill-slot" onclick="useSkill(4)">
      <div class="skill-icon">🛡</div>
      <div class="skill-key">T</div>
      <div class="skill-cd" id="cd-4"></div>
    </div>
  </div>

  <!-- Minimap -->
  <div id="minimap-wrap">
    <canvas id="minimap" width="140" height="140"></canvas>
    <div id="map-name">Başlangıç Köyü</div>
  </div>

  <!-- Chat/Log -->
  <div id="chatbox">
    <div id="chat-log"></div>
  </div>

  <!-- Hedef paneli -->
  <div id="target-panel">
    <div id="target-name">-</div>
    <div id="target-hp-track"><div id="target-hp-bar"></div></div>
  </div>

  <!-- Koordinatlar -->
  <div id="coords" id="coords"></div>

</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
